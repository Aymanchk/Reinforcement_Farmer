<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm Q-Learning</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #181b22;
    --text: #e6e6e6;
    --muted: #9aa3b2;
    --accent: #7cc77c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px;
  }
  header {
    text-align: center;
    margin-bottom: 40px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 2rem;
  }
  header p {
    color: var(--muted);
    margin: 0;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
  }
  @media (min-width: 850px) {
    .grid { grid-template-columns: 1fr 1fr; }
  }
  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .card h2 {
    margin: 0 0 12px;
    font-size: 1.1rem;
    color: var(--accent);
  }
  .card img {
    width: 100%;
    height: auto;
    border-radius: 6px;
    display: block;
  }
  footer {
    text-align: center;
    margin-top: 40px;
    color: var(--muted);
    font-size: 0.9rem;
  }
  code {
    background: #2a2f3a;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>🌾 Farm Q-Learning</h1>
      <p>Табличный Q-Learning агент учится управлять фермой</p>
    </header>

    <div class="grid">
      <div class="card">
        <h2>Прогресс обучения</h2>
        <img src="training_progress.png" alt="График наград по эпизодам">
      </div>
      <div class="card">
        <h2>Агент в действии</h2>
        <img src="training.gif" alt="Анимация тренировки">
      </div>
    </div>

    <footer>
      Запуск: <code>python main.py</code> &nbsp;·&nbsp; α=0.25, γ=0.95, ε-greedy
    </footer>
  </div>
</body>
</html>
